name: SAST Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  sast-scan:
    name: SAST Scan (Semgrep)
    if: "!contains(github.event.pull_request.user.login, 'devin')"
    runs-on: ubuntu-latest
    outputs:
      has_findings: ${{ steps.scan.outputs.has_findings }}
      findings_count: ${{ steps.scan.outputs.findings_count }}
      findings_summary: ${{ steps.scan.outputs.findings_summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST scan
        id: scan
        continue-on-error: true
        run: |
          set +e

          # Run Semgrep with security-focused rulesets, output JSON
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/security-audit" \
            --config "p/cwe-top-25" \
            --config "p/owasp-top-ten" \
            --json \
            --output /tmp/semgrep-results.json \
            backend/ frontend/src/ 2>&1 || true

          # Parse results
          FINDINGS_COUNT=$(jq '.results | length' /tmp/semgrep-results.json 2>/dev/null || echo "0")
          echo "findings_count=${FINDINGS_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$FINDINGS_COUNT" -gt 0 ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"

            # Build a human-readable summary of findings
            SUMMARY=$(jq -r '.results[] |
              "- [\(.extra.severity | ascii_upcase)] \(.check_id)\n  File: \(.path):\(.start.line)\n  Message: \(.extra.message | split("\n")[0])\n"
            ' /tmp/semgrep-results.json 2>/dev/null | head -100)

            {
              echo "findings_summary<<FINDINGS_EOF"
              echo "$SUMMARY"
              echo "FINDINGS_EOF"
            } >> "$GITHUB_OUTPUT"

            echo "::error::Semgrep found ${FINDINGS_COUNT} security finding(s)"
            echo "$SUMMARY"
            exit 1
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "findings_summary=" >> "$GITHUB_OUTPUT"
            echo "No security findings detected."
          fi

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: /tmp/semgrep-results.json
          retention-days: 30

      - name: Comment findings on PR
        if: steps.scan.outcome == 'failure' && steps.scan.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT=$(cat <<'COMMENT_EOF'
          ## 🔒 SAST Scan Failed — Security Vulnerabilities Detected

          **Semgrep** found **${{ steps.scan.outputs.findings_count }} security vulnerability(ies)** in your code.

          ### Findings

          ```
          ${{ steps.scan.outputs.findings_summary }}
          ```

          ### What Happens Next

          A Devin session will be automatically created to fix these vulnerabilities on this branch.

          ### Manual Fix

          Review each finding above and apply the recommended fix (e.g., use parameterized queries instead of string interpolation, avoid `child_process.exec` with user input, remove hardcoded credentials).
          COMMENT_EOF
          )

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"

      - name: Fail if findings detected
        if: steps.scan.outputs.has_findings == 'true'
        run: |
          echo "Failing job: ${FINDINGS_COUNT} SAST findings detected."
          exit 1

  trigger-devin-sast-fix:
    name: Trigger Devin SAST Auto-Fix
    needs: [sast-scan]
    if: |
      always() &&
      !contains(github.event.pull_request.user.login, 'devin') &&
      needs.sast-scan.result == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: /tmp

      - name: Build Devin prompt and create session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          FINDINGS_COUNT: ${{ needs.sast-scan.outputs.findings_count }}
          FINDINGS_SUMMARY: ${{ needs.sast-scan.outputs.findings_summary }}
        run: |
          # Build detailed findings from the JSON artifact
          DETAILED_FINDINGS=$(jq -r '.results[] |
            "### \(.check_id)\n- **Severity:** \(.extra.severity)\n- **File:** \(.path):\(.start.line)-\(.end.line)\n- **Message:** \(.extra.message)\n- **Fix:** \(.extra.fix // "See message for guidance")\n"
          ' /tmp/semgrep-results.json 2>/dev/null | head -200)

          PROMPT=$(cat <<PROMPT_END
          You are a security engineer. A SAST scan (Semgrep) ran on PR #${PR_NUMBER} in repository ${REPO} on branch '${PR_BRANCH}' and found ${FINDINGS_COUNT} security vulnerability(ies).

          Your job is to fix ALL the security vulnerabilities found by the SAST scan.

          ## Findings Summary

          ${FINDINGS_SUMMARY}

          ## Detailed Findings

          ${DETAILED_FINDINGS}

          ## Instructions

          1. Clone the repository ${REPO} and checkout branch '${PR_BRANCH}'.
          2. For each finding, apply the secure fix:
             - SQL Injection: Replace string interpolation/concatenation in SQL queries with parameterized queries using placeholders (?).
             - Command Injection: Replace child_process.exec() with child_process.execFile() or use input validation/sanitization. Never pass unsanitized user input to shell commands.
             - Hardcoded Secrets: Remove any hardcoded credentials, API keys, or passwords. Use environment variables instead.
             - Path Traversal: Validate and sanitize file paths. Use path.resolve() and verify the resolved path is within the expected directory.
             - XSS: Sanitize user input before rendering in HTML responses.
          3. After fixing, verify by installing semgrep (pip install semgrep) and running:
             semgrep scan --config "p/javascript" --config "p/nodejs" --config "p/owasp-top-ten" backend/ frontend/src/
          4. Ensure the application still builds: cd frontend && npm run build
          5. Commit with message: "fix: resolve SAST security findings from Semgrep scan"
          6. Push to branch '${PR_BRANCH}'.

          Constraints:
          - Only fix the security vulnerabilities — do not refactor unrelated code.
          - Maintain the same functionality — the fix should be a secure equivalent of the original code.
          - Do not remove features — replace insecure patterns with secure alternatives.
          PROMPT_END
          )

          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs .)

          REQUEST_BODY=$(jq -n \
            --argjson prompt "$ESCAPED_PROMPT" \
            --arg title "Fix SAST findings on PR #${PR_NUMBER}" \
            --arg repo "$REPO" \
            '{
              prompt: $prompt,
              title: $title,
              repos: [$repo],
              tags: ["sast-fix", "security", "automated"]
            }')

          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '/^HTTP_STATUS:/d')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | grep '^HTTP_STATUS:' | cut -d: -f2)

          if [ "$HTTP_CODE" -eq 200 ]; then
            SESSION_URL=$(echo "$HTTP_BODY" | jq -r '.url')
            SESSION_ID=$(echo "$HTTP_BODY" | jq -r '.session_id')
            echo "Devin session created: ${SESSION_URL}"
            echo "Session ID: ${SESSION_ID}"

            {
              echo "## 🤖 Devin SAST Auto-Fix Triggered"
              echo ""
              echo "A Devin session has been created to fix the ${FINDINGS_COUNT} SAST finding(s)."
              echo ""
              echo "**Session:** ${SESSION_URL}"
              echo ""
              echo "Devin will commit the security fixes directly to branch \`${PR_BRANCH}\`."
            } >> "$GITHUB_STEP_SUMMARY"

            # Comment on the PR with the Devin session link
            COMMENT="## 🤖 Devin Auto-Fix In Progress

            A Devin session has been automatically created to fix the **${FINDINGS_COUNT} security vulnerability(ies)** found by the SAST scan.

            **Devin Session:** ${SESSION_URL}

            Devin will commit the fixes directly to this branch (\`${PR_BRANCH}\`). The SAST scan will re-run automatically once the fixes are pushed."

            gh pr comment "${PR_NUMBER}" --body "$COMMENT"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "$HTTP_BODY"
            exit 1
          fi
