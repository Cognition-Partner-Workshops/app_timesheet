name: SAST Auto-Remediation (Devin)

on:
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  trigger-devin-fix:
    name: Trigger Devin SAST Auto-Fix
    concurrency:
      group: sast-fix-${{ github.event.check_run.pull_requests[0].number }}
      cancel-in-progress: true
    if: |
      github.event.check_run.app.slug == 'sonarcloud' &&
      github.event.check_run.conclusion == 'failure' &&
      github.event.check_run.pull_requests[0]
    runs-on: ubuntu-latest

    steps:
      - name: Get PR details and validate trigger conditions
        id: pr_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.check_run.pull_requests[0].number }}"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR associated with this check run. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get PR details
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} 2>&1)
          PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.user.login')
          PR_BRANCH=$(echo "$PR_DATA" | jq -r '.head.ref')
          PR_STATE=$(echo "$PR_DATA" | jq -r '.state')

          echo "pr_author=${PR_AUTHOR}" >> "$GITHUB_OUTPUT"
          echo "pr_branch=${PR_BRANCH}" >> "$GITHUB_OUTPUT"

          echo "PR #${PR_NUMBER} by ${PR_AUTHOR} on branch ${PR_BRANCH} (state: ${PR_STATE})"

          # Only trigger for author bsmitches on open PRs
          if [ "$PR_AUTHOR" != "bsmitches" ]; then
            echo "PR author is '${PR_AUTHOR}', not 'bsmitches'. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PR_STATE" != "open" ]; then
            echo "PR is not open (state: ${PR_STATE}). Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if Devin has already attempted a fix on this PR (one-time only)
          DEVIN_COMMENTS=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --paginate \
            --jq '[.[] | select(.body | contains("Devin SAST Auto-Fix"))] | length')

          if [ "$DEVIN_COMMENTS" -gt 0 ]; then
            echo "Devin has already attempted a fix on this PR. Skipping (max 1 attempt)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "All conditions met — triggering Devin auto-fix."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Invoke Devin v3 API to remediate
        if: steps.pr_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          CREATE_AS_USER_ID: ${{ secrets.DEVIN_CREATE_AS_USER_ID }}
          PR_NUMBER: ${{ steps.pr_check.outputs.pr_number }}
          PR_BRANCH: ${{ steps.pr_check.outputs.pr_branch }}
          REPO: ${{ github.repository }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          CHECK_URL: ${{ github.event.check_run.html_url }}
          CHECK_OUTPUT_TITLE: ${{ github.event.check_run.output.title }}
          CHECK_OUTPUT_SUMMARY: ${{ github.event.check_run.output.summary }}
        run: |
          PROMPT=$(cat <<PROMPT_END
          A SonarCloud SAST security scan has identified issues on PR #${PR_NUMBER} in repository ${REPO} on branch '${PR_BRANCH}'.

          The SonarCloud quality gate FAILED with the following result:
          - Check: ${CHECK_NAME}
          - Details: ${CHECK_OUTPUT_TITLE}

          This branch has a security issue identified by SonarCloud. Please correct it — this is a one-time automated remediation attempt before the PR is merged.

          Instructions:
          1. Clone the repository ${REPO} and checkout branch '${PR_BRANCH}'.
          2. Review the SonarCloud findings for this PR at: https://sonarcloud.io/dashboard?id=Cognition-Partner-Workshops_app_timesheet&pullRequest=${PR_NUMBER}
          3. Fix ALL security vulnerabilities flagged by SonarCloud:
             - For SQL injection: use parameterized queries instead of string interpolation.
             - For command injection: use child_process.execFile() or validate/sanitize inputs instead of exec().
             - For code injection: remove eval() usage and use safe alternatives.
             - For path traversal: validate file paths and ensure they resolve within the expected directory.
          4. Run the SonarCloud scan rules locally if possible, or verify the fix addresses the specific finding.
          5. Commit the fix with message: "fix: remediate SonarCloud security findings on PR #${PR_NUMBER}"
          6. Push to branch '${PR_BRANCH}'.

          Constraints:
          - Only fix the security vulnerabilities — do not refactor unrelated code.
          - Maintain the same functionality — replace insecure patterns with secure equivalents.
          - This is a ONE-TIME remediation attempt. Make it count.
          PROMPT_END
          )

          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs .)

          REQUEST_BODY=$(jq -n \
            --argjson prompt "$ESCAPED_PROMPT" \
            --arg title "Remediate SonarCloud security findings on PR #${PR_NUMBER}" \
            --arg repo "$REPO" \
            --arg user_id "${CREATE_AS_USER_ID}" \
            '{
              prompt: $prompt,
              title: $title,
              repos: [$repo],
              create_as_user_id: $user_id,
              tags: ["sast-fix", "sonarcloud", "security", "automated"]
            }')

          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '/^HTTP_STATUS:/d')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | grep '^HTTP_STATUS:' | cut -d: -f2)

          if [ "$HTTP_CODE" -eq 200 ]; then
            SESSION_URL=$(echo "$HTTP_BODY" | jq -r '.url')
            SESSION_ID=$(echo "$HTTP_BODY" | jq -r '.session_id')
            echo "Devin session created: ${SESSION_URL}"
            echo "Session ID: ${SESSION_ID}"

            {
              echo "## Devin SAST Auto-Fix Triggered"
              echo ""
              echo "SonarCloud flagged security issues on PR #${PR_NUMBER}."
              echo "A Devin session has been created for a one-time remediation attempt."
              echo ""
              echo "**Session:** ${SESSION_URL}"
            } >> "$GITHUB_STEP_SUMMARY"

            COMMENT=$(cat <<EOF
          ## Devin SAST Auto-Fix — Remediation In Progress

          SonarCloud identified a security issue on this branch. A Devin session has been automatically created for a **one-time remediation attempt** before merge.

          **Devin Session:** ${SESSION_URL}

          Devin will commit the fix directly to branch \`${PR_BRANCH}\`. SonarCloud will re-analyze once the fix is pushed.
          EOF
            )

            gh pr comment "${PR_NUMBER}" --body "$COMMENT"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "$HTTP_BODY"
            exit 1
          fi
