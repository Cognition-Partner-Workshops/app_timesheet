name: PR Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  security-audit:
    name: Security Audit (CVE Check)
    if: "!contains(github.event.pull_request.user.login, 'devin')"
    runs-on: ubuntu-latest
    outputs:
      has_vulnerabilities: ${{ steps.audit.outputs.has_vulnerabilities }}
      total_severe: ${{ steps.audit.outputs.total_severe }}
      high: ${{ steps.audit.outputs.high }}
      critical: ${{ steps.audit.outputs.critical }}
      vuln_details: ${{ steps.audit.outputs.vuln_details }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        id: audit
        working-directory: frontend
        continue-on-error: true
        run: |
          set +e
          AUDIT_OUTPUT=$(npm audit --json 2>&1)
          echo "$AUDIT_OUTPUT" > /tmp/audit-results.json

          HIGH=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.high // 0')
          CRITICAL=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.critical // 0')
          TOTAL_SEVERE=$((HIGH + CRITICAL))

          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "total_severe=$TOTAL_SEVERE" >> "$GITHUB_OUTPUT"

          VULN_DETAILS=$(echo "$AUDIT_OUTPUT" | jq -r '
            .vulnerabilities | to_entries[] |
            select(.value.severity == "high" or .value.severity == "critical") |
            "- [\(.value.severity | ascii_upcase)] \(.key)@\(.value.range): \(.value.via | if type == "array" then (map(if type == "object" then .title // .url else . end) | join(", ")) else . end)"
          ' 2>/dev/null || echo "Could not parse vulnerability details")

          # Pass vuln details via output (escape newlines)
          {
            echo "vuln_details<<VULN_EOF"
            echo "$VULN_DETAILS"
            echo "VULN_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_SEVERE" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> "$GITHUB_OUTPUT"
            echo "Found $TOTAL_SEVERE high/critical vulnerabilities"
            echo "$VULN_DETAILS"
            exit 1
          else
            echo "has_vulnerabilities=false" >> "$GITHUB_OUTPUT"
            echo "No high/critical vulnerabilities found."
          fi

      - name: Comment findings on PR
        if: steps.audit.outcome == 'failure' && steps.audit.outputs.has_vulnerabilities == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT=$(cat <<'EOF'
          ## Security Audit Failed – CVE Detection

          **npm audit** found **${{ steps.audit.outputs.total_severe }} high/critical vulnerability(ies)** (${{ steps.audit.outputs.high }} high, ${{ steps.audit.outputs.critical }} critical) in `frontend/` dependencies.

          ### Vulnerabilities

          ${{ steps.audit.outputs.vuln_details }}

          ### Recommended Fix

          In the `frontend/` directory, upgrade the affected packages to patched versions. Run `npm audit fix` or manually bump versions in `package.json`, then verify with `npm audit` and `npm run build`.
          EOF
          )

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"

      - name: Fail if vulnerabilities found
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        run: |
          echo "Failing job: ${{ steps.audit.outputs.total_severe }} high/critical vulnerabilities found."
          exit 1

  test-coverage:
    name: Quality Gate (Test Coverage)
    if: "!contains(github.event.pull_request.user.login, 'devin')"
    runs-on: ubuntu-latest
    outputs:
      coverage_failed: ${{ steps.coverage.outputs.coverage_failed }}
      coverage_failures: ${{ steps.coverage.outputs.coverage_failures }}
      coverage_table: ${{ steps.coverage.outputs.coverage_table }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        id: coverage
        working-directory: frontend
        continue-on-error: true
        run: |
          set +e
          COVERAGE_OUTPUT=$(npm run test:coverage 2>&1)
          COVERAGE_EXIT=$?

          echo "$COVERAGE_OUTPUT"

          if [ $COVERAGE_EXIT -ne 0 ]; then
            FAILURES=$(echo "$COVERAGE_OUTPUT" | grep "^ERROR:" || true)
            TABLE=$(echo "$COVERAGE_OUTPUT" | sed -n '/^-\{5,\}/,/^-\{5,\}$/p')

            echo "coverage_failed=true" >> "$GITHUB_OUTPUT"

            {
              echo "coverage_failures<<FAIL_EOF"
              echo "$FAILURES"
              echo "FAIL_EOF"
            } >> "$GITHUB_OUTPUT"

            {
              echo "coverage_table<<TABLE_EOF"
              echo "$TABLE"
              echo "TABLE_EOF"
            } >> "$GITHUB_OUTPUT"

            exit 1
          else
            echo "coverage_failed=false" >> "$GITHUB_OUTPUT"
            echo "All coverage thresholds met."
          fi

      - name: Comment findings on PR
        if: steps.coverage.outcome == 'failure' && steps.coverage.outputs.coverage_failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT=$(cat <<'EOF'
          ## Quality Gate Failed – Test Coverage

          Unit test coverage is below the required **80% threshold** for `frontend/src/components/`.

          ### Coverage Failures

          ```
          ${{ steps.coverage.outputs.coverage_failures }}
          ```

          ### Coverage Report

          ```
          ${{ steps.coverage.outputs.coverage_table }}
          ```

          ### Recommended Fix

          Add unit tests in `frontend/src/components/__tests__/` to bring coverage above 80% for branches, functions, lines, and statements. Use vitest with `@testing-library/react`. Do not modify source components or lower the thresholds in `vite.config.ts`.
          EOF
          )

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"

      - name: Fail if coverage below threshold
        if: steps.coverage.outputs.coverage_failed == 'true'
        run: |
          echo "Failing job: test coverage is below the required 80% threshold."
          exit 1

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks on PR diff
        run: |
          gitleaks detect \
            --source . \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --verbose \
            --exit-code 1

      - name: Comment on PR if secrets found
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body \
            "## Secret Scan Failed

          **gitleaks** detected hardcoded secrets in this PR.

          Please remove any secrets from the code and use environment variables instead. See \`.env.example\` for the expected variable names.

          Run \`gitleaks detect --source . --verbose\` locally to identify the findings."

  trigger-devin:
    name: Trigger Devin Auto-Fix
    needs: [security-audit, test-coverage]
    if: |
      always() &&
      !contains(github.event.pull_request.user.login, 'devin') &&
      (needs.security-audit.result == 'failure' || needs.test-coverage.result == 'failure')
    runs-on: ubuntu-latest

    steps:
      - name: Build Devin prompt and create session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          AUDIT_FAILED: ${{ needs.security-audit.result == 'failure' }}
          AUDIT_TOTAL: ${{ needs.security-audit.outputs.total_severe }}
          AUDIT_DETAILS: ${{ needs.security-audit.outputs.vuln_details }}
          COVERAGE_FAILED: ${{ needs.test-coverage.result == 'failure' }}
          COVERAGE_FAILURES: ${{ needs.test-coverage.outputs.coverage_failures }}
          COVERAGE_TABLE: ${{ needs.test-coverage.outputs.coverage_table }}
        run: |
          FAILED_CHECKS=""
          CHILD_INSTRUCTIONS=""

          if [ "$AUDIT_FAILED" = "true" ]; then
            FAILED_CHECKS="${FAILED_CHECKS}\n- Security Audit (CVE Check): ${AUDIT_TOTAL} high/critical vulnerabilities"
            CHILD_INSTRUCTIONS="${CHILD_INSTRUCTIONS}

          CHILD TASK 1 — Fix CVEs:
          Vulnerabilities found:
          ${AUDIT_DETAILS}

          Steps:
          1. In the frontend/ directory, review package.json and package-lock.json.
          2. For each high/critical vulnerability, upgrade the affected package to a patched version that resolves the CVE.
          3. Run \`npm audit\` to verify the fixes resolve the CVEs.
          4. Run \`npm run build\` to ensure nothing is broken.
          5. Run \`npm run test\` to ensure existing tests still pass.
          6. Only fix security vulnerabilities — do not refactor unrelated code.
          7. Prefer minimal version bumps that resolve the CVE."
          fi

          if [ "$COVERAGE_FAILED" = "true" ]; then
            FAILED_CHECKS="${FAILED_CHECKS}\n- Quality Gate (Test Coverage): coverage below 80% threshold"
            CHILD_INSTRUCTIONS="${CHILD_INSTRUCTIONS}

          CHILD TASK 2 — Fix Test Coverage:
          Coverage failures:
          ${COVERAGE_FAILURES}

          Coverage report:
          ${COVERAGE_TABLE}

          Steps:
          1. Review the coverage report to identify which files and lines in frontend/src/components/ are uncovered.
          2. Write meaningful unit tests in frontend/src/components/__tests__/ to bring coverage above the 80% threshold for branches, functions, lines, and statements.
          3. Use vitest with @testing-library/react for component tests. The test setup is in frontend/src/test/setup.ts.
          4. Run \`cd frontend && npm run test:coverage\` to verify coverage meets thresholds.
          5. Do NOT modify any source components — only add or modify test files.
          6. Do NOT change the coverage thresholds in vite.config.ts.
          7. Tests must be meaningful — not just snapshot tests or empty assertions.
          8. Include a render test for the ActivityFeed component to verify the UI feature still works."
          fi

          PROMPT=$(cat <<PROMPT_END
          You are an engineering lead. Two CI quality checks ran on PR #${PR_NUMBER} in repository ${REPO} on branch '${PR_BRANCH}', and one or more failed.

          Failed checks:
          $(echo -e "$FAILED_CHECKS")

          You are the PARENT WORKER. Your job is to orchestrate the fix:

          1. Clone the repository ${REPO} and checkout branch '${PR_BRANCH}'.
          2. For each failed check below, kick off a CHILD WORKER to fix it independently:
          ${CHILD_INSTRUCTIONS}

          3. After all child workers complete, integrate their changes on branch '${PR_BRANCH}':
             - If there are merge conflicts between the children's changes, resolve them sensibly.
             - Run \`cd frontend && npm audit\` to verify CVE fixes (if applicable).
             - Run \`cd frontend && npm run test:coverage\` to verify coverage meets 80% thresholds (if applicable).
             - Run \`cd frontend && npm run build\` to ensure the build succeeds.
          4. Commit with a clear message summarizing all fixes.
          5. Push to branch '${PR_BRANCH}'.

          Constraints:
          - Each child task should be scoped to only its concern — CVE child does not touch tests, coverage child does not touch dependencies (unless needed for test imports).
          - The parent must verify the combined result passes all checks before pushing.
          - Do not modify any code unrelated to the failed checks.
          PROMPT_END
          )

          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs .)

          REQUEST_BODY=$(jq -n \
            --argjson prompt "$ESCAPED_PROMPT" \
            --arg title "Fix failing CI checks on PR #${PR_NUMBER}" \
            --arg repo "$REPO" \
            '{
              prompt: $prompt,
              title: $title,
              repos: [$repo],
              tags: ["ci-fix", "automated", "parent-worker"]
            }')

          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '/^HTTP_STATUS:/d')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | grep '^HTTP_STATUS:' | cut -d: -f2)

          if [ "$HTTP_CODE" -eq 200 ]; then
            SESSION_URL=$(echo "$HTTP_BODY" | jq -r '.url')
            SESSION_ID=$(echo "$HTTP_BODY" | jq -r '.session_id')
            echo "Devin session created: ${SESSION_URL}"
            echo "Session ID: ${SESSION_ID}"

            {
              echo "## Devin Auto-Fix Triggered"
              echo ""
              echo "A Devin parent session has been created to fix the failing CI checks."
              echo ""
              echo "**Session:** ${SESSION_URL}"
              echo ""
              echo "Failed checks being addressed:"
              echo -e "$FAILED_CHECKS"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "$HTTP_BODY"
            exit 1
          fi
