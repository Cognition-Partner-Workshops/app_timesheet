name: Test Suite Maintenance

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - feature/pr-test-update-workflow

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  base-health-check:
    name: Health Check (Base Branch)
    if: "!contains(github.event.pull_request.user.login, 'devin')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          (cd frontend && npm ci)
          (cd backend && npm ci)

      - name: Run backend tests and capture results
        id: backend-tests
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(cd backend && npm test 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Strip ANSI color codes for reliable parsing
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')

          # Jest output: "Tests:       2 failed, 159 passed, 161 total"
          TESTS_LINE=$(echo "$CLEAN" | grep 'Tests:' | tail -1)
          TOTAL=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+total' | grep -oP '\d+' || echo "0")
          PASSED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+passed' | grep -oP '\d+' || echo "0")
          FAILED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+failed' | grep -oP '\d+' || echo "0")

          if [ "$TOTAL" -gt 0 ] 2>/dev/null; then
            PCT=$(( PASSED * 100 / TOTAL ))
          else
            if [ $EXIT_CODE -eq 0 ]; then
              PCT=100
              TOTAL="all"
              PASSED="all"
              FAILED=0
            else
              PCT=0
            fi
          fi

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Run frontend tests and capture results
        id: frontend-tests
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(cd frontend && npm run test 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Strip ANSI color codes for reliable parsing
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')

          # Vitest output: "      Tests  136 passed (136)" or "      Tests  5 failed | 131 passed (136)"
          TESTS_LINE=$(echo "$CLEAN" | grep '^\s*Tests\s' | grep -v 'Test Files' | tail -1)
          # Total is in parentheses at end: (136)
          TOTAL=$(echo "$TESTS_LINE" | grep -oP '\(\d+\)' | grep -oP '\d+' || echo "0")
          PASSED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+passed' | grep -oP '\d+' || echo "0")
          FAILED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+failed' | grep -oP '\d+' || echo "0")

          if [ "$TOTAL" -gt 0 ] 2>/dev/null; then
            PCT=$(( PASSED * 100 / TOTAL ))
          else
            if [ $EXIT_CODE -eq 0 ]; then
              PCT=100
              TOTAL="all"
              PASSED="all"
              FAILED=0
            else
              PCT=0
            fi
          fi

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Comment base branch results on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BE_EXIT="${{ steps.backend-tests.outputs.exit_code }}"
          FE_EXIT="${{ steps.frontend-tests.outputs.exit_code }}"
          BE_PCT="${{ steps.backend-tests.outputs.pct }}"
          FE_PCT="${{ steps.frontend-tests.outputs.pct }}"
          BE_PASSED="${{ steps.backend-tests.outputs.passed }}"
          BE_TOTAL="${{ steps.backend-tests.outputs.total }}"
          FE_PASSED="${{ steps.frontend-tests.outputs.passed }}"
          FE_TOTAL="${{ steps.frontend-tests.outputs.total }}"

          if [ "$BE_EXIT" = "0" ] && [ "$FE_EXIT" = "0" ]; then
            STATUS="✅"
          else
            STATUS="❌"
          fi

          COMMENT="${STATUS} **Health Check — Base Branch (\`${{ github.event.pull_request.base.ref }}\`)**"
          COMMENT="${COMMENT}\n\n"
          COMMENT="${COMMENT}**Backend tests:** ${BE_PCT}% passed (${BE_PASSED}/${BE_TOTAL})\n"
          COMMENT="${COMMENT}**Frontend tests:** ${FE_PCT}% passed (${FE_PASSED}/${FE_TOTAL})\n"

          echo -e "$COMMENT" | gh pr comment ${{ github.event.pull_request.number }} --body-file -

  pr-health-check:
    name: Health Check (PR Branch)
    needs: [base-health-check]
    if: "!contains(github.event.pull_request.user.login, 'devin')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
