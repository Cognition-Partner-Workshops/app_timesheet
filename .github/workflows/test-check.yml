          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          (cd frontend && npm ci)
          (cd backend && npm ci)

      - name: Run backend tests and capture results
        id: backend-tests
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(cd backend && npm test 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Strip ANSI color codes for reliable parsing
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')

          # Jest output: "Tests:       2 failed, 159 passed, 161 total"
          TESTS_LINE=$(echo "$CLEAN" | grep 'Tests:' | tail -1)
          TOTAL=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+total' | grep -oP '\d+' || echo "0")
          PASSED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+passed' | grep -oP '\d+' || echo "0")
          FAILED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+failed' | grep -oP '\d+' || echo "0")

          if [ "$TOTAL" -gt 0 ] 2>/dev/null; then
            PCT=$(( PASSED * 100 / TOTAL ))
          else
            if [ $EXIT_CODE -eq 0 ]; then
              PCT=100
              TOTAL="all"
              PASSED="all"
              FAILED=0
            else
              PCT=0
            fi
          fi

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Run frontend tests and capture results
        id: frontend-tests
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(cd frontend && npm run test 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Strip ANSI color codes for reliable parsing
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')

          # Vitest output: "      Tests  136 passed (136)" or "      Tests  5 failed | 131 passed (136)"
          TESTS_LINE=$(echo "$CLEAN" | grep '^\s*Tests\s' | grep -v 'Test Files' | tail -1)
          # Total is in parentheses at end: (136)
          TOTAL=$(echo "$TESTS_LINE" | grep -oP '\(\d+\)' | grep -oP '\d+' || echo "0")
          PASSED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+passed' | grep -oP '\d+' || echo "0")
          FAILED=$(echo "$TESTS_LINE" | grep -oP '(\d+)\s+failed' | grep -oP '\d+' || echo "0")

