name: Quality Gate (Test Coverage)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  test-coverage:
    name: Unit Test Coverage Check
    if: "!contains(github.event.pull_request.user.login, 'devin')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        id: coverage
        working-directory: frontend
        continue-on-error: true
        run: |
          set +e
          COVERAGE_OUTPUT=$(npm run test:coverage 2>&1)
          COVERAGE_EXIT=$?
          echo "$COVERAGE_OUTPUT" > /tmp/coverage-output.txt

          echo "$COVERAGE_OUTPUT"

          if [ $COVERAGE_EXIT -ne 0 ]; then
            # Extract coverage failure lines
            FAILURES=$(echo "$COVERAGE_OUTPUT" | grep "^ERROR:" || true)
            echo "$FAILURES" > /tmp/coverage-failures.txt

            # Extract the coverage table
            TABLE=$(echo "$COVERAGE_OUTPUT" | sed -n '/% Coverage report/,/^$/p')
            echo "$TABLE" > /tmp/coverage-table.txt

            echo "coverage_failed=true" >> "$GITHUB_OUTPUT"
            echo "coverage_failures<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FAILURES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            exit 1
          else
            echo "coverage_failed=false" >> "$GITHUB_OUTPUT"
            echo "All coverage thresholds met."
          fi

      - name: Comment findings on PR
        if: failure() && steps.coverage.outputs.coverage_failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COVERAGE_FAILURES=$(cat /tmp/coverage-failures.txt)
          COVERAGE_TABLE=$(cat /tmp/coverage-table.txt)

          COMMENT=$(cat <<EOF
          ## Quality Gate Failed – Test Coverage

          Unit test coverage is below the required **80% threshold** for \`frontend/src/components/\`.

          ### Coverage Failures

          \`\`\`
          ${COVERAGE_FAILURES}
          \`\`\`

          ### Coverage Report

          \`\`\`
          ${COVERAGE_TABLE}
          \`\`\`

          ### Recommended Fix

          Add unit tests in \`frontend/src/components/__tests__/\` to bring coverage above 80% for branches, functions, lines, and statements. Use vitest with \`@testing-library/react\`. Do not modify source components or lower the thresholds in \`vite.config.ts\`.
          EOF
          )

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Quality Gate – Test Coverage"
            echo ""
            if [ "${{ steps.coverage.outputs.coverage_failed }}" = "true" ]; then
              echo "**Coverage thresholds not met.**"
              echo ""
              echo '```'
              cat /tmp/coverage-failures.txt 2>/dev/null || echo "Details unavailable"
              echo '```'
              echo ""
              echo "Coverage report:"
              echo '```'
              cat /tmp/coverage-table.txt 2>/dev/null || echo "Details unavailable"
              echo '```'
            else
              echo "All coverage thresholds met."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
