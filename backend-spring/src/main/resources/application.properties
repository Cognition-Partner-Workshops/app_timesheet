# Server Configuration
server.port=3001

# H2 In-Memory Database (equivalent to SQLite in-memory)
spring.datasource.url=jdbc:h2:mem:timetracking
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Frontend URL for CORS
app.frontend-url=http://localhost:5173

# Rate Limiting
app.rate-limit.max-requests=100
app.rate-limit.window-minutes=15
app.rate-limit.login-max-requests=5
app.rate-limit.login-window-minutes=15

# Logging
logging.level.com.timetracking=INFO
logging.level.org.springframework.web=INFO
