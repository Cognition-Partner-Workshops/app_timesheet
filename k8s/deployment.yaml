apiVersion: apps/v1
kind: Deployment
metadata:
  name: timesheet-app
  namespace: timesheet-app
  labels:
    app.kubernetes.io/name: timesheet-app
    app.kubernetes.io/component: server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: timesheet-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: timesheet-app
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: timesheet-app
          image: __ACR_LOGIN_SERVER__/timesheet-app:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: timesheet-app-config
            - secretRef:
                name: timesheet-app-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
