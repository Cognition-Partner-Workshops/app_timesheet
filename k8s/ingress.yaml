apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: timesheet-app
  namespace: timesheet-app
  labels:
    app.kubernetes.io/name: timesheet-app
    app.kubernetes.io/component: ingress
  annotations:
    # Use the NGINX ingress controller bundled with AKS.
    # Install it via:  az aks enable-addons --addons http_application_routing
    # or deploy the community ingress-nginx chart.
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: timesheet-app
                port:
                  number: 80
