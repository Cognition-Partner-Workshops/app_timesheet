apiVersion: v1
kind: ConfigMap
metadata:
  name: timesheet-app-config
  namespace: timesheet-app
  labels:
    app.kubernetes.io/name: timesheet-app
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  PORT: "3001"
  AZURE_SQL_PORT: "1433"
  AZURE_SQL_ENCRYPT: "true"
  AZURE_SQL_TRUST_CERT: "false"
