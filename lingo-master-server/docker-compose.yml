version: "3.8"

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:16-alpine
    container_name: lingomaster-db
    environment:
      POSTGRES_USER: lingomaster
      POSTGRES_PASSWORD: lingomaster
      POSTGRES_DB: lingomaster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingomaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: lingomaster-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: lingomaster-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # LingoMaster API服务
  api:
    build: .
    container_name: lingomaster-api
    environment:
      DATABASE_URL: postgresql+asyncpg://lingomaster:lingomaster@postgres:5432/lingomaster
      DATABASE_URL_SYNC: postgresql://lingomaster:lingomaster@postgres:5432/lingomaster
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      LLM_BASE_URL: http://llm:8000/v1
      TTS_BASE_URL: http://tts:5000
      JWT_SECRET_KEY: lingomaster-production-secret-key
      DEBUG: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # TTS服务 (MeloTTS)
  tts:
    build:
      context: ./ai-services/tts
      dockerfile: Dockerfile
    container_name: lingomaster-tts
    ports:
      - "5000:5000"
    volumes:
      - ttsmodels:/app/models
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  ttsmodels:
