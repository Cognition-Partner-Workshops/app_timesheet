<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Bot Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <h1>Investment Bot</h1>
            </div>
            <span class="subtitle">Real-time Financial News & Market Dashboard</span>
        </div>
        <div class="header-right">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search news..." />
            </div>
            <button id="refreshBtn" class="btn-refresh" title="Refresh data">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                    <path d="M16 16h5v5"></path>
                </svg>
            </button>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span id="lastUpdated">Loading...</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <!-- Market Overview Section -->
        <section class="market-overview" id="marketOverview">
            <h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"></path>
                    <path d="m19 9-5 5-4-4-3 3"></path>
                </svg>
                Market Overview
            </h2>
            <div class="market-grid" id="marketGrid">
                <div class="loading-placeholder">Loading market data...</div>
            </div>
        </section>

        <!-- Category Tabs -->
        <section class="news-section">
            <div class="category-tabs" id="categoryTabs">
                <button class="tab active" data-category="all">All News</button>
                <button class="tab" data-category="markets">Markets</button>
                <button class="tab" data-category="stocks">Stocks</button>
                <button class="tab" data-category="economy">Economy</button>
                <button class="tab" data-category="crypto">Crypto</button>
                <button class="tab" data-category="commodities">Commodities</button>
                <button class="tab" data-category="technology">Technology</button>
            </div>

            <!-- News Feed -->
            <div class="news-feed" id="newsFeed">
                <div class="loading-placeholder">
                    <div class="spinner"></div>
                    <p>Fetching latest financial news...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Investment Bot Dashboard &mdash; Data sourced from public RSS feeds. Auto-refreshes every 5 minutes.</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
